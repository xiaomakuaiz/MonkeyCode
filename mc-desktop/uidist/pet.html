<!DOCTYPE html>
<!-- 桌宠页:透明置顶小窗,主窗口不在前台时外显任务聚合状态。
     形象:官方吉祥物 8 帧"点头打盹"精灵图(pet-sprite.webp,88px@2x),
     CSS steps(8) 逐帧播放——待机慢速打盹、运行中快速点头、等审批定格
     摇晃、离线定格在低头睡着帧并灰化。
     数据流:sessions_list 命令取快照 → session-event 壳事件持续更新
     (壳聚合引擎状态,引擎重启对本页透明);快照失败视为引擎离线,
     3s 重试,另有 10s 周期性快照兜底探活。 -->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>MonkeyCode 桌宠</title>
<style>
  * { box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  html, body { margin:0; background:transparent; overflow:hidden; }
  body {
    width:116px; height:120px; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    font:11px/1.4 system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    cursor:grab;
  }
  body:active { cursor:grabbing; }

  /* ---- 气泡 ---- */
  #bubble {
    max-width:112px; padding:4px 9px; border-radius:9px; margin-bottom:2px;
    background:rgba(19,19,22,.88); color:#d8d8de; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:relative;
    opacity:0; transform:translateY(4px); transition:opacity .2s, transform .2s;
  }
  #bubble::after {  /* 小尾巴 */
    content:""; position:absolute; left:50%; bottom:-4px; margin-left:-4px;
    border:4px solid transparent; border-top-color:rgba(19,19,22,.88); border-bottom:0;
  }
  body.has-bubble #bubble { opacity:1; transform:none; }
  #bubble.ok  { background:rgba(5,150,105,.92); color:#eafff5; }
  #bubble.ok::after { border-top-color:rgba(5,150,105,.92); }
  #bubble.warn { background:rgba(161,98,7,.92); color:#fff7e0; }
  #bubble.warn::after { border-top-color:rgba(161,98,7,.92); }
  #bubble.err { background:rgba(185,52,52,.92); color:#ffecec; }
  #bubble.err::after { border-top-color:rgba(185,52,52,.92); }

  /* ---- 吉祥物精灵图:31 帧横条("多状态表演长动画"四阶段 + 旧组睡着帧)。
         帧段:1-7 无所事事 / 8-16 写代码 / 17-23 看通知 / 24-30 庆祝 / 31 睡着。
         各状态在自己的帧段内 steps 循环;庆祝只播一遍后定格末姿势 ---- */
  #wrap { width:88px; height:88px; }
  #sprite {
    width:88px; height:88px;
    background:url(pet-sprite.webp) 0 0 / 2728px 88px no-repeat;
  }
  @keyframes idle-loop   { from { background-position-x:0; }       to { background-position-x:-616px; } }
  @keyframes work-loop   { from { background-position-x:-616px; }  to { background-position-x:-1408px; } }
  @keyframes notify-loop { from { background-position-x:-1408px; } to { background-position-x:-2024px; } }
  @keyframes cheer-once  { from { background-position-x:-2024px; } to { background-position-x:-2640px; } }

  /* 空闲 7 帧全是独立姿势(非补间)。桌宠挂在余光位,动作越频繁越抢注意力,
     而空闲正是最不该抢注意力的状态:2.5s/姿势 ≈ 人发呆时的小动作节奏 */
  body.st-idle      #sprite { animation:idle-loop 17.5s steps(7) infinite; }
  body.st-running   #sprite { animation:work-loop 1.2s steps(9) infinite; }
  body.st-waiting   #sprite { animation:notify-loop 1.6s steps(7) infinite; }
  /* 庆祝:播一遍(帧 24-30),动画结束回落到基准位 = 末帧叉腰挺胸,撑满气泡时长 */
  body.st-celebrate #sprite { background-position-x:-2552px; animation:cheer-once 1.4s steps(7); }
  body.st-offline   #sprite {
    background-position-x:-2640px; /* 第 31 帧:完全低头睡着 */
    filter:grayscale(.7) brightness(.92); opacity:.85;
  }
</style>
</head>
<body class="st-offline">
  <div id="bubble"></div>
  <div id="wrap"><div id="sprite"></div></div>

<script>
  const invoke = window.__TAURI__.core.invoke;
  const bubble = document.getElementById('bubble');

  // 事件音效:桌宠窗口隐藏时 webview 仍在运行,所以无论猴子是否可见、
  // 主窗口是否在前台都会响。同一音效 2s 内只响一次,避免并发叠音。
  const sounds = {
    start: new Audio('sound-app-start.mp3'),      // 应用启动(首次连上内核)
    end: new Audio('sound-task-end.mp3'),         // 轮次完成
    error: new Audio('sound-task-error.mp3'),     // 任务出错
    ask: new Audio('sound-permission.mp3'),       // 请求审批
    idle: new Audio('sound-idle.mp3'),            // 持续空闲满 10 分钟
  };
  for (const a of Object.values(sounds)) a.volume = 0.7;
  const lastPlay = {};
  function play(key) {
    const now = Date.now();
    if (now - (lastPlay[key] || 0) < 2000) return;
    lastPlay[key] = now;
    const a = sounds[key];
    a.currentTime = 0;
    a.play().catch(() => {}); // 自动播放被平台策略拦下时静默放弃
  }
  let startPlayed = false; // 启动音只在首次连上时响,内核重启重连不再响

  // 空闲提醒:完全空闲(无运行/无待审批且在线)持续满 10 分钟响一次;
  // 任何内核事件都会走 render 重置计时,持续空闲则每 10 分钟再响
  const IDLE_MS = 10 * 60 * 1000;
  let idleTimer = null;
  function armIdle(idle) {
    clearTimeout(idleTimer);
    idleTimer = null;
    if (!idle) return;
    idleTimer = setTimeout(() => {
      play('idle');
      armIdle(true);
    }, IDLE_MS);
  }

  // ---- 聚合状态:会话表(快照 + 事件增量) ----
  const sessions = new Map(); // id -> { status, waiting }
  let retryTimer = null;
  let flash = null; // { tone, text } 终态闪现,几秒后回落
  let flashTimer = null;

  function setBubble(tone, text) {
    bubble.className = tone || '';
    bubble.textContent = text || '';
    document.body.classList.toggle('has-bubble', !!text);
  }

  function render(offline) {
    if (offline) {
      armIdle(false);
      document.body.className = 'st-offline';
      setBubble('', '内核休息中 Zzz');
      return;
    }
    let running = 0, waiting = 0;
    for (const s of sessions.values()) {
      if (s.waiting) waiting++;
      else if (s.status === 'running') running++;
    }
    armIdle(running === 0 && waiting === 0);
    document.body.className = flash && flash.cheer
      ? 'st-celebrate'
      : waiting ? 'st-waiting' : running ? 'st-running' : 'st-idle';
    if (flash) setBubble(flash.tone, flash.text);
    else if (waiting) setBubble('warn', '等你审批!');
    else if (running) setBubble('ok', running + ' 个任务运行中');
    else setBubble('', '');
  }

  /** cheer=true 时闪现期间播庆祝动作(仅任务完成用) */
  function showFlash(tone, text, cheer) {
    flash = { tone, text, cheer };
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => { flash = null; render(false); }, 4000);
    render(false);
  }

  function retry() {
    clearTimeout(retryTimer);
    retryTimer = setTimeout(snapshot, 3000);
  }

  let online = false;
  async function snapshot() {
    let list;
    try {
      list = await invoke('sessions_list');
    } catch {
      online = false;
      render(true);
      return retry();
    }
    sessions.clear();
    for (const m of list) {
      sessions.set(m.id, { status: m.status, waiting: !!m.waiting_ask });
    }
    online = true;
    render(false);
    if (!startPlayed) {
      startPlayed = true;
      play('start');
    }
  }

  // 壳事件:引擎重启对本页透明(监听器挂在壳上,始终有效)
  window.__TAURI__.event.listen('session-event', (evt) => {
    const e = evt.payload;
    if (!e || !e.id) return;
    const s = sessions.get(e.id) || { status: '', waiting: false };
    if (e.type === 'session-status') {
      s.status = e.status;
      if (e.status === 'finished') {
        showFlash('ok', '「' + (e.title || '任务') + '」完成 ✓', true);
        play('end');
      } else if (e.status === 'error') {
        showFlash('err', '「' + (e.title || '任务') + '」出错 ✗');
        play('error');
      }
    } else if (e.type === 'session-ask') {
      s.waiting = !!e.open;
      if (e.open) play('ask');
    } else {
      return;
    }
    sessions.set(e.id, s);
    online = true;
    render(false);
  });

  // 周期性快照兜底:探活(引擎停了没有任何事件外显)+ 收敛漏掉的状态
  setInterval(() => { if (online) snapshot(); }, 10000);
  snapshot();

  // ---- 交互:拖动(位移阈值)与点击(唤回主窗口) ----
  // macOS 不能走原生 startDragging:tao 在 mac 上用 performWindowDragWithEvent,
  // 它只认"当下正在处理的 mousedown 事件"——阈值方案到 mousemove 才发起,
  // 事件已过期,原生拖拽静默失败(窗口不动,松手还被判成点击)。
  // mac 改为手动移窗(setPosition 跟随鼠标);Windows/Linux 保留原生拖拽
  // (WM_NCLBUTTONDOWN/合成器语义,按住期间任何时刻发起都有效,且更顺滑)。
  const isMac = /Mac/i.test(navigator.platform || navigator.userAgent);
  const petWin = () => window.__TAURI__.window.getCurrentWindow();
  let down = null, dragged = false, winPos = null;
  document.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    down = { x: e.screenX, y: e.screenY };
    dragged = false;
    winPos = null;
    if (isMac) petWin().outerPosition().then((p) => { winPos = p; }).catch(() => {});
  });
  document.addEventListener('mousemove', (e) => {
    if (!down) return;
    const dx = e.screenX - down.x, dy = e.screenY - down.y;
    if (!dragged && Math.abs(dx) + Math.abs(dy) <= 4) return;
    dragged = true;
    if (isMac) {
      if (!winPos) return; // outerPosition 未返回前先不动
      const s = window.devicePixelRatio || 1; // screenX 是逻辑坐标,窗口位置是物理像素
      petWin().setPosition(new window.__TAURI__.dpi.PhysicalPosition(
        Math.round(winPos.x + dx * s), Math.round(winPos.y + dy * s)));
    } else {
      down = null; // OS 接管拖动后 mouseup 不可靠,直接终结本次手势
      petWin().startDragging();
    }
  });
  document.addEventListener('mouseup', () => {
    if (down && !dragged) invoke('show_main');
    down = null;
  });
  document.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
