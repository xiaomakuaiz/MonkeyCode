<!DOCTYPE html>
<!-- 桌宠页:透明置顶小窗,主窗口不在前台时外显任务聚合状态。
     形象:官方吉祥物 8 帧"点头打盹"精灵图(pet-sprite.webp,88px@2x),
     CSS steps(8) 逐帧播放——待机慢速打盹、运行中快速点头、等审批定格
     摇晃、离线定格在低头睡着帧并灰化。
     数据流:kernel_info 命令取内核地址与令牌 → /api/sessions 快照 →
     /api/events SSE 持续更新;断流后重取令牌整体重连(保存设置会重启
     内核并轮换 token,EventSource 自带重连解决不了令牌失效)。 -->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>MonkeyCode 桌宠</title>
<style>
  * { box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  html, body { margin:0; background:transparent; overflow:hidden; }
  body {
    width:116px; height:120px; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    font:11px/1.4 system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    cursor:grab;
  }
  body:active { cursor:grabbing; }

  /* ---- 气泡 ---- */
  #bubble {
    max-width:112px; padding:4px 9px; border-radius:9px; margin-bottom:2px;
    background:rgba(19,19,22,.88); color:#d8d8de; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:relative;
    opacity:0; transform:translateY(4px); transition:opacity .2s, transform .2s;
  }
  #bubble::after {  /* 小尾巴 */
    content:""; position:absolute; left:50%; bottom:-4px; margin-left:-4px;
    border:4px solid transparent; border-top-color:rgba(19,19,22,.88); border-bottom:0;
  }
  body.has-bubble #bubble { opacity:1; transform:none; }
  #bubble.ok  { background:rgba(5,150,105,.92); color:#eafff5; }
  #bubble.ok::after { border-top-color:rgba(5,150,105,.92); }
  #bubble.warn { background:rgba(161,98,7,.92); color:#fff7e0; }
  #bubble.warn::after { border-top-color:rgba(161,98,7,.92); }
  #bubble.err { background:rgba(185,52,52,.92); color:#ffecec; }
  #bubble.err::after { border-top-color:rgba(185,52,52,.92); }

  /* ---- 吉祥物精灵图:7 帧横条(1-2 敲键盘 / 3-4 过渡 / 5-6 叉腰休息 /
         7 睡着,来自旧"点头打盹"组),steps 逐帧 ---- */
  #wrap { width:88px; height:88px; }
  #sprite {
    width:88px; height:88px;
    background:url(pet-sprite.webp) 0 0 / 616px 88px no-repeat;
  }
  /* 敲键盘:第 1-2 帧交替 */
  @keyframes work { from { background-position-x:0; } to { background-position-x:-176px; } }
  /* 叉腰休息:第 5-6 帧慢速交替 */
  @keyframes rest { from { background-position-x:-352px; } to { background-position-x:-528px; } }
  @keyframes shake { 0%,100% { transform:rotate(-4deg); } 50% { transform:rotate(4deg); } }

  body.st-idle    #sprite { animation:rest 1.8s steps(2) infinite; }
  body.st-running #sprite { animation:work .5s steps(2) infinite; }
  body.st-waiting #sprite { background-position-x:-352px; } /* 叉腰定格:不耐烦地等 */
  body.st-waiting #wrap   { animation:shake .5s ease-in-out infinite; transform-origin:50% 90%; }
  body.st-offline #sprite {
    background-position-x:-528px; /* 第 7 帧:完全低头睡着 */
    filter:grayscale(.7) brightness(.92); opacity:.85;
  }
</style>
</head>
<body class="st-offline">
  <div id="bubble"></div>
  <div id="wrap"><div id="sprite"></div></div>

<script>
  const invoke = window.__TAURI__.core.invoke;
  const bubble = document.getElementById('bubble');

  // 事件音效:桌宠窗口隐藏时 webview 仍在运行,所以无论猴子是否可见、
  // 主窗口是否在前台都会响。同一音效 2s 内只响一次,避免并发叠音。
  const sounds = {
    start: new Audio('sound-app-start.mp3'),      // 应用启动(首次连上内核)
    end: new Audio('sound-task-end.mp3'),         // 轮次完成
    error: new Audio('sound-task-error.mp3'),     // 任务出错
    ask: new Audio('sound-permission.mp3'),       // 请求审批
    idle: new Audio('sound-idle.mp3'),            // 持续空闲满 10 分钟
  };
  for (const a of Object.values(sounds)) a.volume = 0.7;
  const lastPlay = {};
  function play(key) {
    const now = Date.now();
    if (now - (lastPlay[key] || 0) < 2000) return;
    lastPlay[key] = now;
    const a = sounds[key];
    a.currentTime = 0;
    a.play().catch(() => {}); // 自动播放被平台策略拦下时静默放弃
  }
  let startPlayed = false; // 启动音只在首次连上时响,内核重启重连不再响

  // 空闲提醒:完全空闲(无运行/无待审批且在线)持续满 10 分钟响一次;
  // 任何内核事件都会走 render 重置计时,持续空闲则每 10 分钟再响
  const IDLE_MS = 10 * 60 * 1000;
  let idleTimer = null;
  function armIdle(idle) {
    clearTimeout(idleTimer);
    idleTimer = null;
    if (!idle) return;
    idleTimer = setTimeout(() => {
      play('idle');
      armIdle(true);
    }, IDLE_MS);
  }

  // ---- 聚合状态:会话表(快照 + 事件增量) ----
  const sessions = new Map(); // id -> { status, waiting }
  let es = null;
  let retryTimer = null;
  let flash = null; // { tone, text } 终态闪现,几秒后回落
  let flashTimer = null;

  function setBubble(tone, text) {
    bubble.className = tone || '';
    bubble.textContent = text || '';
    document.body.classList.toggle('has-bubble', !!text);
  }

  function render(offline) {
    if (offline) {
      armIdle(false);
      document.body.className = 'st-offline';
      setBubble('', '内核休息中 Zzz');
      return;
    }
    let running = 0, waiting = 0;
    for (const s of sessions.values()) {
      if (s.waiting) waiting++;
      else if (s.status === 'running') running++;
    }
    armIdle(running === 0 && waiting === 0);
    document.body.className = waiting ? 'st-waiting' : running ? 'st-running' : 'st-idle';
    if (flash) setBubble(flash.tone, flash.text);
    else if (waiting) setBubble('warn', '等你审批!');
    else if (running) setBubble('ok', running + ' 个任务运行中');
    else setBubble('', '');
  }

  function showFlash(tone, text) {
    flash = { tone, text };
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => { flash = null; render(false); }, 4000);
    render(false);
  }

  function retry() {
    clearTimeout(retryTimer);
    retryTimer = setTimeout(connect, 3000);
  }

  async function connect() {
    let info;
    try {
      info = await invoke('kernel_info');
    } catch {
      render(true);
      return retry();
    }
    const base = 'http://127.0.0.1:' + info.port;
    const tk = encodeURIComponent(info.token);
    try {
      const r = await fetch(base + '/api/sessions?token=' + tk);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      sessions.clear();
      for (const m of await r.json()) {
        sessions.set(m.id, { status: m.status, waiting: !!m.waiting_ask });
      }
    } catch {
      render(true);
      return retry();
    }
    render(false);
    if (!startPlayed) {
      startPlayed = true;
      play('start');
    }
    es = new EventSource(base + '/api/events?token=' + tk);
    es.onmessage = (m) => {
      let e;
      try { e = JSON.parse(m.data); } catch { return; }
      const s = sessions.get(e.id) || { status: '', waiting: false };
      if (e.type === 'session-status') {
        s.status = e.status;
        if (e.status === 'finished') {
          showFlash('ok', '「' + (e.title || '任务') + '」完成 ✓');
          play('end');
        } else if (e.status === 'error') {
          showFlash('err', '「' + (e.title || '任务') + '」出错 ✗');
          play('error');
        }
      } else if (e.type === 'session-ask') {
        s.waiting = !!e.open;
        if (e.open) play('ask');
      } else {
        return;
      }
      sessions.set(e.id, s);
      render(false);
    };
    // 首个 error 即整体重连:内核重启会轮换 token,自带重连无法恢复
    es.onerror = () => {
      es.close();
      es = null;
      render(true);
      retry();
    };
  }
  connect();

  // ---- 交互:拖动(位移阈值)与点击(唤回主窗口) ----
  let down = null, dragged = false;
  document.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    down = { x: e.screenX, y: e.screenY };
    dragged = false;
  });
  document.addEventListener('mousemove', (e) => {
    if (!down || dragged) return;
    if (Math.abs(e.screenX - down.x) + Math.abs(e.screenY - down.y) > 4) {
      dragged = true;
      down = null; // OS 接管拖动后 mouseup 不可靠,直接终结本次手势
      window.__TAURI__.window.getCurrentWindow().startDragging();
    }
  });
  document.addEventListener('mouseup', () => {
    if (down && !dragged) invoke('show_main');
    down = null;
  });
  document.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
