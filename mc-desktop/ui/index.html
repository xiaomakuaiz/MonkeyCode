<!DOCTYPE html>
<!-- 占位页:仅在内核启动失败时展示错误;正常流程直接打开内核 UI。 -->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>MonkeyCode</title>
<style>
  body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
         background:#0f1115; color:#e6e6e6;
         font:15px/1.8 -apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
  .box { max-width:520px; padding:32px; text-align:center; }
  .err { color:#f85149; word-break:break-all; }
  .hint { color:#8b93a3; font-size:13px; margin-top:12px; }
</style>
</head>
<body>
<div class="box">
  <h2>⚠ 启动失败</h2>
  <p class="err" id="msg">未知错误</p>
  <p class="hint">可尝试在设置中检查模型配置后重新保存;若为安装问题,
     请重新安装应用后重试。</p>
  <p><button id="settingsBtn" style="background:#4f8cff;color:#fff;border:0;border-radius:8px;
     padding:8px 16px;cursor:pointer;font:inherit">打开设置</button></p>
</div>
<script>
  const m = decodeURIComponent(location.hash.slice(1) || '');
  if (m) document.getElementById('msg').textContent = m;
  document.getElementById('settingsBtn').onclick = () =>
    window.__TAURI__.core.invoke('open_settings_window').catch(() => {});
</script>
</body>
</html>
