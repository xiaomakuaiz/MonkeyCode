name: Desktop macOS Build

on:
  workflow_dispatch:
  push:
    branches: [feat-local-version]
    paths: ["mc-desktop/**", "agent/**", ".github/workflows/desktop-macos.yml"]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: mc-desktop

      - name: Build app bundle (universal, unsigned)
        working-directory: mc-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        # secret 就绪时走发布构建(额外产出签名的 updater tar.gz + latest.json),
        # 否则回退普通打包,CI 不红
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            make macos-release
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY 未配置,跳过 updater 产物"
            make macos
          fi

      - name: Zip .app
        working-directory: mc-desktop/target/universal-apple-darwin/release/bundle
        run: ditto -c -k --keepParent macos/MonkeyCode.app MonkeyCode-macos-universal.app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MonkeyCode-macos-universal
          path: |
            mc-desktop/target/universal-apple-darwin/release/bundle/MonkeyCode-macos-universal.app.zip
            mc-desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            mc-desktop/target/universal-apple-darwin/release/bundle/updater/*
