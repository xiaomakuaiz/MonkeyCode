name: Desktop macOS Build

# macOS runner 计费贵,不随 push 自动构建;需要出包时在 Actions 页手动 Run workflow
on:
  workflow_dispatch:

env:
  # 引擎版本钉死:升级引擎 = 改这里(配合壳的 system/ready 能力握手)
  OHMYAGENT_REF: c1d848244e88e612aec770f6215a7853cbc0950b

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: mc-desktop

      # 浏览器扩展:随包分发(tauri bundle.resources 引用 dist,缺失会打包失败)
      - name: Build browser extension
        working-directory: browser-extension
        run: |
          npm ci
          npm run build

      # 引擎源码(独立仓库,钉 OHMYAGENT_REF;单引擎化后引擎必须进包,
      # 凭据缺失直接失败而非静默出无引擎包)
      - name: Fetch ohmyagent (pinned)
        env:
          OHMYAGENT_REPO_TOKEN: ${{ secrets.OHMYAGENT_REPO_TOKEN }}
        run: |
          [ -n "$OHMYAGENT_REPO_TOKEN" ] || { echo "::error::OHMYAGENT_REPO_TOKEN 未配置,引擎无法进包"; exit 1; }
          git init -q /tmp/ohmyagent
          cd /tmp/ohmyagent
          git remote add origin "https://x-access-token:${OHMYAGENT_REPO_TOKEN}@github.com/chaitin/ohmyagent.git"
          git fetch -q --depth 1 origin "$OHMYAGENT_REF"
          git checkout -q FETCH_HEAD

      - name: Build app bundle (universal, unsigned)
        working-directory: mc-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          OHMYAGENT_SRC: /tmp/ohmyagent
        # secret 就绪时走发布构建(额外产出签名的 updater tar.gz + latest.json),
        # 否则回退普通打包,CI 不红;引擎 sidecar 由 make 从 OHMYAGENT_SRC 构建
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            make macos-release
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY 未配置,跳过 updater 产物"
            make macos
          fi

      - name: Zip .app
        working-directory: mc-desktop/target/universal-apple-darwin/release/bundle
        run: ditto -c -k --keepParent macos/MonkeyCode.app MonkeyCode-macos-universal.app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MonkeyCode-macos-universal
          path: |
            mc-desktop/target/universal-apple-darwin/release/bundle/MonkeyCode-macos-universal.app.zip
            mc-desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            mc-desktop/target/universal-apple-darwin/release/bundle/updater/*
