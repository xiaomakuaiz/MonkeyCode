name: Desktop macOS Build

# macOS runner 计费贵,不随 push 自动构建;需要出包时在 Actions 页手动 Run workflow
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: mc-desktop

      # 浏览器扩展:随包分发(tauri bundle.resources 引用 dist,缺失会打包失败)
      - name: Build browser extension
        working-directory: browser-extension
        run: |
          npm ci
          npm run build

      # ohmyagent 引擎 sidecar(可选):独立仓库,凭据就绪时才构建并打进包;
      # 缺失时用户仍可自装 ohmyagent 到 PATH(壳 find_ohmyagent 兜底)
      - name: Build ohmyagent sidecar (optional)
        id: ohmy
        env:
          OHMYAGENT_REPO_TOKEN: ${{ secrets.OHMYAGENT_REPO_TOKEN }}
        run: |
          if [ -z "$OHMYAGENT_REPO_TOKEN" ]; then
            echo "::notice::OHMYAGENT_REPO_TOKEN 未配置,跳过 ohmyagent sidecar"
            echo "built=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${OHMYAGENT_REPO_TOKEN}@github.com/chaitin/ohmyagent.git" /tmp/ohmyagent
          cd /tmp/ohmyagent
          BIN="$GITHUB_WORKSPACE/mc-desktop/binaries"
          mkdir -p "$BIN"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" \
            -o "$BIN/ohmyagent-aarch64-apple-darwin" ./cmd/ohmyagent
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w" \
            -o "$BIN/ohmyagent-x86_64-apple-darwin" ./cmd/ohmyagent
          lipo -create -output "$BIN/ohmyagent-universal-apple-darwin" \
            "$BIN/ohmyagent-aarch64-apple-darwin" "$BIN/ohmyagent-x86_64-apple-darwin"
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Build app bundle (universal, unsigned)
        working-directory: mc-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          OHMY_BUILT: ${{ steps.ohmy.outputs.built }}
        # secret 就绪时走发布构建(额外产出签名的 updater tar.gz + latest.json),
        # 否则回退普通打包,CI 不红
        run: |
          # ohmyagent sidecar 就绪时叠加 externalBin 覆盖配置(Makefile 对
          # 环境注入的 EXTRA_TAURI_CONFIG 用 += 追加,release 配置不冲掉它)
          if [ "$OHMY_BUILT" = "true" ]; then
            export EXTRA_TAURI_CONFIG="--config tauri.ohmy.conf.json"
          fi
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            make macos-release
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY 未配置,跳过 updater 产物"
            make macos
          fi

      - name: Zip .app
        working-directory: mc-desktop/target/universal-apple-darwin/release/bundle
        run: ditto -c -k --keepParent macos/MonkeyCode.app MonkeyCode-macos-universal.app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MonkeyCode-macos-universal
          path: |
            mc-desktop/target/universal-apple-darwin/release/bundle/MonkeyCode-macos-universal.app.zip
            mc-desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            mc-desktop/target/universal-apple-darwin/release/bundle/updater/*
