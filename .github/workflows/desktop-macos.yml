name: Desktop macOS Build

# macOS runner 计费贵,不随 push 自动构建;需要出包时在 Actions 页手动 Run workflow
on:
  workflow_dispatch:

# 引擎版本 = agent/ submodule 的 gitlink(仓库内单一来源);
# 升级引擎 = bump submodule(配合壳的 system/ready 能力握手)

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      # 浏览器扩展:随包分发(tauri bundle.resources 引用 dist,缺失会打包失败)
      - name: Build browser extension
        working-directory: browser-extension
        run: |
          npm ci
          npm run build

      # 引擎源码来自 agent/ submodule(私库,checkout 默认 GITHUB_TOKEN
      # 无跨库权限 → 用 OHMYAGENT_REPO_TOKEN;.gitmodules 是 ssh URL,
      # 经 insteadOf 重写为带 token 的 https)。单引擎化后引擎必须进包,
      # 凭据缺失直接失败而非静默出无引擎包
      - name: Checkout engine submodule (agent/)
        env:
          OHMYAGENT_REPO_TOKEN: ${{ secrets.OHMYAGENT_REPO_TOKEN }}
        run: |
          [ -n "$OHMYAGENT_REPO_TOKEN" ] || { echo "::error::OHMYAGENT_REPO_TOKEN 未配置,引擎无法进包"; exit 1; }
          git config --global url."https://x-access-token:${OHMYAGENT_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"
          git submodule update --init agent

      - name: Build app bundle (universal, unsigned)
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          OHMYAGENT_SRC: ${{ github.workspace }}/agent
        # secret 就绪时走发布构建(额外产出签名的 updater tar.gz + latest.json),
        # 否则回退普通打包,CI 不红;引擎 sidecar 由 make 从 OHMYAGENT_SRC 构建
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            make macos-release
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY 未配置,跳过 updater 产物"
            make macos
          fi

      - name: Zip .app
        working-directory: desktop/target/universal-apple-darwin/release/bundle
        run: ditto -c -k --keepParent macos/MonkeyCode.app MonkeyCode-macos-universal.app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MonkeyCode-macos-universal
          path: |
            desktop/target/universal-apple-darwin/release/bundle/MonkeyCode-macos-universal.app.zip
            desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            desktop/target/universal-apple-darwin/release/bundle/updater/*
