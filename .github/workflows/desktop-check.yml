name: Desktop Checks

on:
  pull_request:
    paths:
      - "desktop/**"
      - "agent"
      - ".gitmodules"
      - ".github/workflows/desktop-check.yml"
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "agent"
      - ".gitmodules"
      - ".github/workflows/desktop-check.yml"

permissions:
  contents: read

concurrency:
  group: desktop-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        if: github.event_name == 'push'
        with:
          go-version: stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Test and build desktop UI
        working-directory: desktop/ui
        run: |
          npm ci
          npm test
          npm run build

      - name: Check IPC command contract and release scripts
        working-directory: desktop
        run: |
          python3 scripts/check_command_contract.py
          python3 -m unittest discover -s scripts -p 'test_*.py'

      - name: Check and test Rust shell
        working-directory: desktop
        # E2E only runs when MC_OHMYAGENT_BIN explicitly pins a built agent;
        # ordinary PR CI remains hermetic and cannot pick up a runner PATH binary.
        run: |
          cargo check --all-targets --locked
          cargo test --locked

      - name: Test pinned agent integration
        if: github.event_name == 'push'
        env:
          OHMYAGENT_REPO_TOKEN: ${{ secrets.OHMYAGENT_REPO_TOKEN }}
        run: |
          if [ -z "$OHMYAGENT_REPO_TOKEN" ]; then
            echo "::warning::OHMYAGENT_REPO_TOKEN 未配置，跳过固定引擎 E2E"
            exit 0
          fi
          git -c url."https://x-access-token:${OHMYAGENT_REPO_TOKEN}@github.com/".insteadOf="git@github.com:" \
            submodule update --init agent
          mkdir -p desktop/target/e2e
          (cd agent && go build -o ../desktop/target/e2e/ohmyagent ./cmd/ohmyagent)
          MC_OHMYAGENT_BIN="$GITHUB_WORKSPACE/desktop/target/e2e/ohmyagent" \
            cargo test --manifest-path desktop/Cargo.toml e2e_ -- --test-threads=1

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Build desktop UI
        working-directory: desktop/ui
        run: |
          npm ci
          npm run build

      - name: Check command contract
        working-directory: desktop
        run: python scripts/check_command_contract.py

      - name: Check and test Windows shell
        working-directory: desktop
        run: |
          cargo check --all-targets --locked
          cargo test --locked
