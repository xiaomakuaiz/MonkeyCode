name: Desktop Windows Build

on:
  workflow_dispatch:
  push:
    branches: [feat-local-version]
    paths: ["desktop/**", ".github/workflows/desktop-windows.yml"]

env:
  # 引擎版本钉死:升级引擎 = 改这里(配合壳的 system/ready 能力握手)
  OHMYAGENT_REF: 4e6193a9df739e06355107b923458a6fe3c628e8

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      # 浏览器扩展:随包分发(tauri bundle.resources 引用 dist,缺失会打包失败)
      - name: Build browser extension
        working-directory: browser-extension
        run: |
          npm ci
          npm run build

      # 引擎 sidecar:独立仓库,钉 OHMYAGENT_REF;单引擎化后引擎必须进包,
      # 凭据缺失直接失败而非静默出无引擎包
      - name: Build ohmyagent sidecar (pinned)
        env:
          OHMYAGENT_REPO_TOKEN: ${{ secrets.OHMYAGENT_REPO_TOKEN }}
        run: |
          [ -n "$OHMYAGENT_REPO_TOKEN" ] || { echo "::error::OHMYAGENT_REPO_TOKEN 未配置,引擎无法进包"; exit 1; }
          git init -q /tmp/ohmyagent
          cd /tmp/ohmyagent
          git remote add origin "https://x-access-token:${OHMYAGENT_REPO_TOKEN}@github.com/chaitin/ohmyagent.git"
          git fetch -q --depth 1 origin "$OHMYAGENT_REF"
          git checkout -q FETCH_HEAD
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" \
            -o "$GITHUB_WORKSPACE/desktop/binaries/ohmyagent-x86_64-pc-windows-msvc.exe" ./cmd/ohmyagent

      # secret 就绪时走发布构建(额外产出签名的 updater setup.exe + latest-windows.json),
      # 否则回退普通打包,CI 不红
      - name: Build NSIS installer
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            npx --yes @tauri-apps/cli@^2 build \
              --config tauri.windows.conf.json --config tauri.release.conf.json
            python scripts/gen-latest-json.py windows
          else
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY 未配置,跳过 updater 产物"
            npx --yes @tauri-apps/cli@^2 build --config tauri.windows.conf.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: MonkeyCode-windows-x64
          path: |
            desktop/target/release/bundle/nsis/*.exe
            desktop/target/release/bundle/updater/*
